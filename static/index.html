<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AyurChain - Register</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f14;
            color: #e6edf3;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #1f2937;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #22c55e;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #0b0f14;
            color: white;
        }

        input[type="date"] {
            color: #ccc;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Register a New Product</h1>

        <form id="productForm">

            <!-- Herb -->
            <div class="card">
                <h3>Herb Details</h3>
                <input id="name" placeholder="e.g Ashwagandha" required />
                <textarea id="description" placeholder="Description..."></textarea>
            </div>

            <!-- Farmer -->
            <div class="card">
                <h3>Farmer Identity</h3>
                <input id="producer_name" placeholder="Producer Name" required />
                <input id="producer_id" placeholder="Producer ID" required />
                <input id="farmer_name" placeholder="Farmer Name" />
                <input id="location" placeholder="Location" />
            </div>

            <!-- Timeline -->
            <div class="card">
                <h3>Supply Chain</h3>
                <input type="date" id="harvest_date" />
            </div>

            <button type="submit">Generate QR & Publish</button>

        </form>
    </div>

    <script>
        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                description: document.getElementById("description").value,
                producer_name: document.getElementById("producer_name").value,
                producer_id: document.getElementById("producer_id").value,
                farmer_name: document.getElementById("farmer_name").value,
                location: document.getElementById("location").value,
                harvest_date: document.getElementById("harvest_date").value,
                status: "Verified"
            };

            try {
                const res = await fetch("https://ayurchain-1.onrender.com/add-product", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    alert("✅ Product Created");
                    window.open("https://ayurchain-1.onrender.com" + result.qr_code);
                } else {
                    alert("❌ " + result.detail);
                }

            } catch (err) {
                alert("❌ Server error");
                console.error(err);
            }
        });
    </script>

</body>

</html>
