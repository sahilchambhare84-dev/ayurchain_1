<!DOCTYPE html>
<html>

<head>
    <title>AyurChain - Register Product</title>
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            background: #0d1117;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: #22c55e;
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Register Product</h2>

        <form id="productForm">
            <input id="name" placeholder="Herb Name" required>

            <input id="producer_name" placeholder="Producer Name" required>

            <input id="producer_id" placeholder="Producer ID" required>

            <input id="farmer_name" placeholder="Farmer Name">

            <input id="location" placeholder="Location">

            <input type="date" id="harvest_date">

            <textarea id="description" placeholder="Description"></textarea>

            <button type="submit">Generate QR</button>
        </form>
    </div>

    <script>
        document.getElementById("productForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById("name").value,
                description: document.getElementById("description").value,
                producer_name: document.getElementById("producer_name").value,
                producer_id: document.getElementById("producer_id").value,
                farmer_name: document.getElementById("farmer_name").value,
                location: document.getElementById("location").value,
                harvest_date: document.getElementById("harvest_date").value,
                status: "Verified"
            };

            try {
                const res = await fetch("https://ayurchain-1.onrender.com/add-product", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (res.ok) {
                    alert("✅ Product Added!");

                    // open QR
                    window.open(`https://ayurchain-1.onrender.com${result.qr_code}`, "_blank");

                } else {
                    alert("❌ " + result.detail);
                }

            } catch (err) {
                alert("❌ Server Error");
                console.error(err);
            }
        });
    </script>

</body>

</html>
